spring.application.name=Github Repo reader

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update

# H2 File-Persistent Database Configuration
spring.datasource.url=jdbc:h2:file:./data/github_repo_reader;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Server Settings
server.port=8082
server.address=0.0.0.0

# GitHub Configuration
github.access_token=${GITHUB_TOKEN:NOT_SET}
